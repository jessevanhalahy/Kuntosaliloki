<!DOCTYPE html>
<html>
<head>
    <title>Gym Log</title>
</head>
<body>
    <h1>Gym Log</h1>
    <nav>
        {% if session.username %}
            Welcome, <b>{{ session.username }}</b>! | 
            <a href="/new">Add New Exercise</a> | 
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a> | <a href="/register">Register</a>
        {% endif %}
    </nav>
    <hr>
    <form action="/" method="GET">
        <input type="text" name="query" placeholder="Search exercises..." value="{{ query }}">
        <input type="submit" value="Search">
    </form>
    <h2>Exercises</h2>
    {% for e in exercises %}
        <div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
            <h3>{{ e.name }} <small>({{ e.category }})</small></h3>
            <p>{{ e.description }}</p>
        </div>
    {% else %}
        <p>No exercises found.</p>
    {% endfor %}
</body>
</html>
